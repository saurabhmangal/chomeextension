<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>E-Commerce Comparator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h2>Product Comparator</h2>
  <details id="api-settings">
    <summary id="api-summary">&#9881; API Key</summary>
    <div class="api-key-row">
      <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API key…" autocomplete="off" />
      <button type="button" id="saveKey">Save</button>
    </div>
    <div id="apiKeyStatus"></div>
  </details>
  <button id="scanTabs" type="button">Scan Product Tabs</button>
  <ul id="productList"></ul>
  <div class="action-row">
    <button id="compare" type="button" disabled>Compare &amp; CSV</button>
    <button id="summarize" type="button" disabled>Summarize Selected</button>
  </div>
  <div id="status"></div>
  <div id="progress">
    <div id="spinner" class="spinner"></div>
    <span id="progress-text"></span>
  </div>
  <pre id="summary"></pre>
  <div id="summaries"></div>
  <script src="popup.js"></script>
</body>
</html>
